<div class="readings nu">
   {% for book in site.data.books %}
   <div><a href = "{{ book.link }}"><span class="book-teaser__title">{{ book.title }}</span></a></div>
   <div><span class="book-teaser__author">{{ book.author }}</span></div>
   <div><span class="book-teaser__date">{{ book.completed | date: "%Y-%m-%d" }}</span></div>
    {% endfor %}
</div>
