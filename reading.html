<ul class="reading-list">
   {% for book in site.data.books %}
        <li>
          <a href = "{{ book.link }}">
              <span class="book-teaser__title">{{ book.title }}</span>
          </a>
          <span class="book-teaser__author"> {{ book.author }} </span>
          <span class="book-teaser__date"> {{ book.completed | date: "%d %B %Y" }} </span>
<!--            <span class="book-teaser__stars"> ★ </span>-->
        </li>
    {% endfor %}
</ul>
